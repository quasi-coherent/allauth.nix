[project]
name = "allauth"
version = "0.1.0"
description = "Alliance Auth runtime"
requires-python = ">=3.10,<=3.14"
dependencies = ["allianceauth==5.1.4", "gunicorn>23"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/allauth"]
